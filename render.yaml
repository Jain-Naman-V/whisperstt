services:
  - type: web
    name: whisper-asr
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: WHISPER_CACHE_DIR
        value: /tmp/whisper-cache
      - key: HF_HOME
        value: /tmp/huggingface
      - key: HF_HUB_CACHE
        value: /tmp/huggingface/hub
