name: Keep Render Alive

on:
  schedule:
    - cron: "*/03 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app to prevent spin-down
        run: |
          curl -sS --max-time 30 "${{ vars.RENDER_APP_URL || 'https://whisper-asr.onrender.com' }}/health" || echo "Ping failed (expected if not deployed yet)"
