name: Keep Render Alive

on:
  schedule:
    - cron: "*/03 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app to prevent spin-down
        run: |
          curl -sS --max-time 30 "https://whisperstt-r9ss.onrender.com/health" || echo "Ping failed (expected if not deployed yet)"
